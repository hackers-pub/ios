query ArticleTranslationQuery($id: ID!, $language: Locale!) {
  node(id: $id) {
    ... on Article {
      id
      contents(includeBeingTranslated: true, language: $language) {
        id
        language
        title
        content
        summary
        toc
        beingTranslated
        url
      }
    }
  }
}

query PostSharesQuery($id: ID!, $after: String) {
  node(id: $id) {
    ... on Post {
      shares(first: 20, after: $after) {
