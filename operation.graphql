      }
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation RemoveReactionFromPostMutation($postId: ID!, $emoji: String!) {
  removeReactionFromPost(input: { postId: $postId, emoji: $emoji }) {
    ... on RemoveReactionFromPostPayload {
      success
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation SharePostMutation($postId: ID!) {
  sharePost(input: { postId: $postId }) {
    ... on SharePostPayload {
      originalPost {
        id
        viewerHasShared
        engagementStats {
          replies
          reactions
          shares
          quotes
        }
      }
      share {
        id
      }
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation UnsharePostMutation($postId: ID!) {
  unsharePost(input: { postId: $postId }) {
    ... on UnsharePostPayload {
      originalPost {
        id
        viewerHasShared
        engagementStats {
          replies
          reactions
          shares
          quotes
        }
      }
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation DeletePostMutation($id: ID!) {
  deletePost(input: { id: $id }) {
    ... on DeletePostPayload {
      deletedPostId
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
    ... on SharedPostDeletionNotAllowedError {
      inputPath
    }
  }
}
