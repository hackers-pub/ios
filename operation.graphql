mutation LoginByUsernameMutation($username: String!, $locale: Locale!, $verifyUrl: URITemplate!) {
  loginByUsername(username: $username, locale: $locale, verifyUrl: $verifyUrl) {
    ... on LoginChallenge {
      token
    }
    ... on AccountNotFoundError {
      query
    }
  }
}

mutation CompleteLoginChallengeMutation($token: UUID!, $code: String!) {
  completeLoginChallenge(token: $token, code: $code) {
    id
    account {
      id
      username
      name
      avatarUrl
      handle
    }
  }
}

mutation CreateNoteMutation($content: Markdown!, $language: Locale!, $visibility: PostVisibility!, $replyTargetId: ID, $quotedPostId: ID) {
  createNote(input: { content: $content, language: $language, visibility: $visibility, replyTargetId: $replyTargetId, quotedPostId: $quotedPostId }) {
    ... on CreateNotePayload {
      note {
        id
        content
        published
      }
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation RevokeSessionMutation($sessionId: UUID!) {
  revokeSession(sessionId: $sessionId) {
    id
  }
}

