mutation LoginByUsernameMutation($username: String!, $locale: Locale!, $verifyUrl: URITemplate!) {
  loginByUsername(username: $username, locale: $locale, verifyUrl: $verifyUrl) {
    ... on LoginChallenge {
      token
    }
    ... on AccountNotFoundError {
      query
    }
  }
}

mutation CompleteLoginChallengeMutation($token: UUID!, $code: String!) {
  completeLoginChallenge(token: $token, code: $code) {
    id
    account {
      id
      username
      name
      avatarUrl
      handle
    }
  }
}

mutation GetPasskeyAuthenticationOptionsMutation($sessionId: UUID!) {
  getPasskeyAuthenticationOptions(sessionId: $sessionId)
}

mutation LoginByPasskeyMutation($sessionId: UUID!, $authenticationResponse: JSON!) {
  loginByPasskey(sessionId: $sessionId, authenticationResponse: $authenticationResponse) {
    id
    account {
      id
      username
      name
      avatarUrl
      handle
    }
  }
}

mutation GetPasskeyRegistrationOptionsMutation($accountId: ID!) {
  getPasskeyRegistrationOptions(accountId: $accountId)
}

mutation VerifyPasskeyRegistrationMutation($accountId: ID!, $name: String!, $registrationResponse: JSON!) {
  verifyPasskeyRegistration(accountId: $accountId, name: $name, registrationResponse: $registrationResponse) {
    verified
    passkey {
      id
      name
      created
      lastUsed
    }
  }
}

