query PublicTimelineQuery($after: String) {
  publicTimeline(first: 20, after: $after) {
    edges {
      cursor
      node {
        __typename
        id
        name
        published
        summary
        content
        excerpt
        url
        iri
        viewerHasShared
        actor {
          id
          name
          handle
          avatarUrl
        }
        media {
          url
          thumbnailUrl
          alt
          height
          width
        }
        sharedPost {
          __typename
          id
          name
          published
          summary
          content
          excerpt
          url
          iri
          viewerHasShared
          actor {
            id
            name
            handle
            avatarUrl
          }
          media {
            url
            thumbnailUrl
            alt
            height
            width
          }
          engagementStats {
            replies
            reactions
            shares
            quotes
          }
          mentions(first: 20) {
            edges {
              node {
                handle
              }
            }
          }
        }
        quotedPost {
          __typename
          id
          name
          published
          summary
          content
          excerpt
          url
          iri
          actor {
            id
            name
            handle
            avatarUrl
          }
          media {
            url
            thumbnailUrl
            alt
            height
            width
          }
        }
        engagementStats {
          replies
          reactions
          shares
          quotes
        }
        reactionGroups {
          __typename
          ... on EmojiReactionGroup {
            emoji
            reactors {
              totalCount
              viewerHasReacted
            }
          }
          ... on CustomEmojiReactionGroup {
            customEmoji {
              id
              name
              imageUrl
            }
            reactors {
              totalCount
              viewerHasReacted
            }
          }
        }
        mentions(first: 20) {
          edges {
            node {
              handle
            }
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

