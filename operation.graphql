mutation StartMediumUploadMutation($contentType: MediaType!, $contentLength: Int!) {
  startMediumUpload(input: { contentType: $contentType, contentLength: $contentLength }) {
    ... on StartMediumUploadPayload {
      uploadId
      uploadUrl
      method
      headers {
        name
        value
      }
      expires
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation FinishMediumUploadMutation($uploadId: UUID!) {
  finishMediumUpload(input: { uploadId: $uploadId }) {
    ... on FinishMediumUploadPayload {
      medium {
        uuid
        url
        type
        width
        height
        contentHash
      }
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}

mutation CreateNoteMutation($content: Markdown!, $language: Locale!, $visibility: PostVisibility!, $media: [CreateNoteMediumInput!] = [], $replyTargetId: ID, $quotedPostId: ID) {
  createNote(input: { content: $content, language: $language, visibility: $visibility, media: $media, replyTargetId: $replyTargetId, quotedPostId: $quotedPostId }) {
